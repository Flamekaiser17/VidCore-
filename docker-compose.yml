version: '3.8'

services:
  # The VidVore Node.js application
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - MONGODB_URL=mongodb://mongodb:27017
      - UPSTASH_REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=*
      - ACCESS_TOKEN_SECRET=vidvore_access_super_secret_key_2024
      - REFRESH_TOKEN_SECRET=vidvore_refresh_super_secret_key_2024
      - ACCESS_TOKEN_EXPIRY=1d
      - REFRESH_TOKEN_EXPIRY=10d
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME} # Pull from host's .env if possible
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      - mongodb
      - redis
    networks:
      - vidvore-network

  # MongoDB Service
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - vidvore-network

  # Redis Service
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - vidvore-network

# Persistence for MongoDB
volumes:
  mongo-data:

# Internal network for service communication
networks:
  vidvore-network:
    driver: bridge
